#
# Same services as with_logic.yaml, but the upper layer has
# bypass-logic: true, so the builder must bind PassthroughLogic
# regardless of the service's `logic:` declaration.

stack: bypass_logic_stack
layers:
  - service: simple_service
    entity:  SIMPLE_SERVICE_ENTITY
  - service: protocol_with_logic
    entity:  WITH_LOGIC_ENTITY
    bypass-logic: true
