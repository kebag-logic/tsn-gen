#
# The service declares `logic: __never_registered_in_tests__`, which
# would normally be an error. With bypass-logic: true the builder must
# not consult the registry at all -> binds PassthroughLogic cleanly.

stack: bypass_unknown_logic_stack
layers:
  - service: protocol_with_unknown_logic
    entity:  UNKNOWN_LOGIC_ENTITY
    bypass-logic: true
