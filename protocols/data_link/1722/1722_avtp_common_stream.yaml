#
# IEEE 1722-2016 AVTP common stream header (the streaming counterpart of
# the control header in 1722_avtp_control.yaml). Precedes stream payload
# (AAF, CVF, ...) on the wire.
#
# Layout (MSB-first, 24 bytes):
#    8b  subtype                 AVTP subtype (0x02 AAF, 0x03 CVF, ...)
#    1b  sv                      stream_id valid
#    3b  version
#    1b  mr                      media clock restart
#    1b  reserved
#    1b  tv                      timestamp valid
#    8b  sequence_num
#    1b  reserved2
#    7b  tu                      timestamp uncertain (+ reserved)
#   64b  stream_id
#   32b  avtp_timestamp
#   32b  format_specific_data
#   16b  stream_data_length
#   16b  format_specific_data_2

service: 1722_avtp_common_stream

vars:
  - var: subtype
    size: 8
    expected:
      values: [0x02, 0x03]        # 0x02 AAF, 0x03 CVF

  - var: sv
    size: 1

  - var: version
    size: 3
    expected:
      value: 0

  - var: mr
    size: 1

  - var: reserved
    size: 1
    expected:
      value: 0

  - var: tv
    size: 1

  - var: sequence_num
    size: 8

  - var: reserved2
    size: 1
    expected:
      value: 0

  - var: tu
    size: 7

  - var: stream_id
    size: 64

  - var: avtp_timestamp
    size: 32

  - var: format_specific_data
    size: 32

  - var: stream_data_length
    size: 16

  - var: format_specific_data_2
    size: 16

entities:
  - entity: AVTP_STREAM
    interfaces:
      - interface: AVTP_STREAM_IF
        dir: out
        vars:
          - var_ref: subtype
          - var_ref: sv
          - var_ref: version
          - var_ref: mr
          - var_ref: reserved
          - var_ref: tv
          - var_ref: sequence_num
          - var_ref: reserved2
          - var_ref: tu
          - var_ref: stream_id
          - var_ref: avtp_timestamp
          - var_ref: format_specific_data
          - var_ref: stream_data_length
          - var_ref: format_specific_data_2
